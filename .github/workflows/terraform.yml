# Backend state is stored in S3 in us-east-1. BlackTickets dev resources are
# currently deployed in us-east-1; change AWS_REGION and TF_VAR_aws_region
# together if the workload region moves.
name: Terraform

on:
  push:
    branches:
      - main
    paths:
      - terraform/**
      - .github/workflows/terraform.yml
  pull_request:
    branches:
      - main
    paths:
      - terraform/**
      - .github/workflows/terraform.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  AWS_REGION: us-east-1
  TF_VAR_aws_region: us-east-1
  TF_VAR_project_name: blacktickets
  TF_VAR_environment: dev

jobs:
  terraform:
    name: Terraform Plan and Apply
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
          key: terraform-${{ runner.os }}-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-${{ runner.os }}-

      - name: Configure Terraform plugin cache
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          cat > ~/.terraformrc <<'EOF'
          plugin_cache_dir = "$HOME/.terraform.d/plugin-cache"
          EOF

      - name: Terraform init
        run: terraform init -backend-config=dev.hcl

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Validate required secrets
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          if [ -z "$DB_PASSWORD" ]; then
            echo "GitHub secret DB_PASSWORD is missing or empty."
            exit 1
          fi

      - name: Terraform plan
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform plan -var-file=dev.tfvars -out=tfplan -no-color

      - name: Convert plan to text
        run: terraform show -no-color tfplan > plan.txt

      - name: Comment plan on pull request
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            const maxLength = 60000;
            const truncated = plan.length > maxLength
              ? `${plan.slice(0, maxLength)}\n\n... plan truncated ...`
              : plan;
            const body = `## Terraform Plan\n\n\`\`\`terraform\n${truncated}\n\`\`\``;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Upload Terraform plan on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-debug
          path: |
            terraform/tfplan
            terraform/plan.txt
          if-no-files-found: ignore

      - name: Terraform apply
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: terraform apply -auto-approve tfplan

      - name: Add Terraform outputs to summary
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          {
            echo "## Terraform Outputs"
            echo
            echo '```'
            terraform output
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
